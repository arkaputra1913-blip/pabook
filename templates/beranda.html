{% extends "base.html" %}
{% block title %}Beranda{% endblock %}

{% block content %}
<div class="hero-section">

  <h1 class="hero-title">Selamat Datang di <span>Pabook</span></h1>
  <p class="hero-subtitle">Parkir lebih aman, mudah, dan nyaman</p>

  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-value count-up">{{ available }}</div>
      <div class="hero-stat-label">Slot Tersedia</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-value count-up">{{ total }}</div>
      <div class="hero-stat-label">Total Slot</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-value count-up">{{ occupied }}</div>
      <div class="hero-stat-label">Slot Terisi</div>
    </div>
  </div>

  <a href="{{ url_for('reservasi') }}" class="hero-cta">
    <i class="fas fa-parking"></i>
    Reservasi Sekarang
  </a>

</div>
{% endblock %}
