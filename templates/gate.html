{% extends "base.html" %}
{% block title %}Gate Scanner{% endblock %}

{% block content %}
<div class="gate-container" style="max-width:600px;">
  <h1 class="page-title text-center">Kontrol Gate</h1>

  <!-- Kontrol Gate -->
  <div class="gate-card mb-4">
    <div class="gate-ctrl-grid">

      <!-- Gate Masuk -->
      <div class="gate-ctrl-box entry-box">
        <div class="gate-ctrl-label">Gate Masuk</div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="gate-ctrl-btn entry-btn" id="btnBukaMasuk" onclick="bukaGate('masuk')" style="flex:1;">
            <i class="fas fa-lock-open me-1"></i>Buka
          </button>
          <button class="gate-ctrl-btn" id="btnTutupMasuk" onclick="tutupGate('masuk')"
                  style="flex:1; opacity:0.45;" disabled>
            <i class="fas fa-lock me-1"></i>Tutup
          </button>
        </div>
      </div>

      <div class="gate-divider">
        <div class="gate-div-line"></div>
        <div class="gate-div-icon"><i class="fas fa-arrows-alt-h"></i></div>
        <div class="gate-div-line"></div>
      </div>

      <!-- Gate Keluar -->
      <div class="gate-ctrl-box exit-box">
        <div class="gate-ctrl-label">Gate Keluar</div>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="gate-ctrl-btn exit-btn" id="btnBukaKeluar" onclick="bukaGate('keluar')" style="flex:1;">
            <i class="fas fa-lock-open me-1"></i>Buka
          </button>
          <button class="gate-ctrl-btn" id="btnTutupKeluar" onclick="tutupGate('keluar')"
                  style="flex:1; opacity:0.45;" disabled>
            <i class="fas fa-lock me-1"></i>Tutup
          </button>
        </div>
      </div>

    </div>

    <div id="ctrlResult" class="scan-result mt-4" style="display:none;"></div>
  </div>

  <!-- Scan QR via USB Scanner -->
  <div class="card p-4">
    <h6 class="gate-section-title">
      <i class="fas fa-barcode me-2" style="color:var(--primary);"></i>Scanner USB / Keyboard
    </h6>
    <div class="scanner-input-wrap mt-3">
      <input type="text" id="scannerInput" class="form-control scanner-input"
             placeholder="Fokus di sini, lalu scan QR Code..."
             autocomplete="off" autocorrect="off" spellcheck="false"
             onkeydown="handleScannerKey(event)">
      <div class="scanner-indicator" id="scannerIndicator">
        <i class="fas fa-circle"></i> Menunggu scan
      </div>
    </div>

    <div id="scanResult" class="scan-result" style="display:none;"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let scannerBusy = false;

const GATE_IDS = {
  masuk:  'GATE-MASUK-A',
  keluar: 'GATE-KELUAR-A'
};

// ── Kontrol Manual Gate ──────────────────────────────────────────

async function bukaGate(gate) {
  const btn = document.getElementById(gate === 'masuk' ? 'btnBukaMasuk' : 'btnBukaKeluar');
  btn.disabled = true; btn.style.opacity = '0.45';
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Mengirim...';
  try {
    const res  = await fetch('/api/gate/open', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ gate_id: GATE_IDS[gate], gate })
    });
    const data = await res.json();
    showCtrlResult(data.ok
      ? `Perintah buka <strong>${gate === 'masuk' ? 'Masuk' : 'Keluar'}</strong> dikirim`
      : 'Gagal mengirim perintah', data.ok);
    if (!data.ok) { btn.disabled = false; btn.style.opacity = '1'; }
  } catch {
    showCtrlResult('Tidak bisa terhubung ke server', false);
    btn.disabled = false; btn.style.opacity = '1';
  }
  btn.innerHTML = '<i class="fas fa-lock-open me-1"></i>Buka';
}

async function tutupGate(gate) {
  const btn = document.getElementById(gate === 'masuk' ? 'btnTutupMasuk' : 'btnTutupKeluar');
  btn.disabled = true; btn.style.opacity = '0.45';
  btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Mengirim...';
  try {
    const res  = await fetch('/api/gate/close', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ gate_id: GATE_IDS[gate], gate })
    });
    const data = await res.json();
    showCtrlResult(data.ok
      ? `Perintah tutup <strong>${gate === 'masuk' ? 'Masuk' : 'Keluar'}</strong> dikirim`
      : 'Gagal mengirim perintah tutup', data.ok);
  } catch { showCtrlResult('Tidak bisa terhubung ke server', false); }
  btn.innerHTML = '<i class="fas fa-lock me-1"></i>Tutup';
}

function showCtrlResult(msg, ok) {
  const el = document.getElementById('ctrlResult');
  el.style.display = 'block';
  el.className = `scan-result ${ok ? 'scan-ok' : 'scan-err'}`;
  el.innerHTML = (ok ? '✅ ' : '❌ ') + msg;
  setTimeout(() => el.style.display = 'none', 5000);
}

// ── USB Scanner Input ────────────────────────────────────────────

const scannerInput = document.getElementById('scannerInput');
const indicator    = document.getElementById('scannerIndicator');
scannerInput.focus();

document.addEventListener('click', e => {
  if (!e.target.closest('button') && !e.target.closest('a')) scannerInput.focus();
});

function handleScannerKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const token = scannerInput.value.trim();
    scannerInput.value = '';
    if (token.length > 10 && !scannerBusy) processToken(token);
  }
}

// ── Proses Token QR ──────────────────────────────────────────────
// Pakai /gate/scan/auto → server yang tentukan masuk atau keluar
// berdasarkan status reservasi di database.

async function processToken(token) {
  scannerBusy = true;
  indicator.innerHTML = '<i class="fas fa-circle blink" style="color:#FFB900;"></i> Memvalidasi...';

  try {
    const res    = await fetch('/gate/scan/auto', {
      method:  'POST',
      headers: {'Content-Type': 'application/json'},
      body:    JSON.stringify({ qr_token: token })
    });
    const result = await res.json();
    showScanResult(result.message, result.success);
  } catch {
    showScanResult('Gagal terhubung ke server!', false);
  }

  indicator.innerHTML = '<i class="fas fa-circle" style="color:#7CB900;"></i> Siap scan berikutnya';
  setTimeout(() => {
    indicator.innerHTML = '<i class="fas fa-circle"></i> Menunggu scan';
    scannerBusy = false;
  }, 2000);
}

function showScanResult(msg, ok) {
  const el = document.getElementById('scanResult');
  el.style.display = 'block';
  el.className = `scan-result ${ok ? 'scan-ok' : 'scan-err'}`;
  el.innerHTML = (ok ? '✅ ' : '❌ ') + msg;
  setTimeout(() => el.style.display = 'none', 6000);
}
</script>
{% endblock %}
